<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Blog Admin Login</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    h1 {
      margin-bottom: 20px;
      color: #333;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #24292e;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #30363d;
    }
    .btn img {
      width: 20px;
      height: 20px;
    }
    .loading {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <h1>Blog Admin</h1>
    <div class="loading">Loading...</div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    
    if (code) {
      document.getElementById('app').innerHTML = '<h1>Blog Admin</h1><div class="loading">Authenticating...</div>';
      
      fetch(window.location.origin + '/.netlify/functions/auth?code=' + code + '&provider=github', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.token) {
          sessionStorage.setItem('netlify-cms-oauth-token', JSON.stringify({
            token: data.token,
            token_type: data.token_type || 'bearer',
            expires_in: data.expires_in || 3600,
            provider: data.provider || 'github'
          }));
          window.location.href = 'index.html';
        } else {
          document.getElementById('app').innerHTML = '<h1>Error</h1><p>' + (data.error || 'Authentication failed') + '</p><a href="login.html" class="btn">Try again</a>';
        }
      })
      .catch(error => {
        document.getElementById('app').innerHTML = '<h1>Error</h1><p>' + error.message + '</p><a href="login.html" class="btn">Try again</a>';
      });
    } else {
      fetch(window.location.origin + '/.netlify/functions/auth?provider=github', {
        method: 'GET',
        headers: {
          'Content-Type': 'application/json'
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.authorize_url) {
          document.getElementById('app').innerHTML = '<h1>Blog Admin</h1><a href="' + data.authorize_url + '" class="btn"><img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub">Login with GitHub</a>';
        } else {
          document.getElementById('app').innerHTML = '<h1>Error</h1><p>' + (data.error || 'Failed to get auth URL') + '</p><div class="loading">Reloading...</div>';
          setTimeout(() => window.location.reload(), 3000);
        }
      })
      .catch(error => {
        document.getElementById('app').innerHTML = '<h1>Error</h1><p>' + error.message + '</p><div class="loading">Reloading...</div>';
        setTimeout(() => window.location.reload(), 3000);
      });
    }
  </script>
</body>
</html>
