<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.css" />
</head>
<body>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'NuhSul423/blog',
          branch: 'main',
          auth_type: 'manual'
        },
        publish_mode: 'editorial_workflow',
        media_folder: 'source/uploads',
        public_folder: '/uploads',
        collections: [
          {
            name: 'post',
            label: '文章',
            folder: 'source/_posts',
            create: true,
            slug: ':year-:month-:day-:title',
            fields: [
              { label: '标题', name: 'title', widget: 'string' },
              { label: '日期', name: 'date', widget: 'datetime' },
              { label: '分类', name: 'categories', widget: 'list', default: ['未分类'] },
              { label: '标签', name: 'tags', widget: 'list' },
              { label: '内容', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'page',
            label: '页面',
            files: [
              {
                label: '关于页面',
                name: 'about',
                file: 'source/about/index.md',
                fields: [
                  { label: '标题', name: 'title', widget: 'string' },
                  { label: '内容', name: 'body', widget: 'markdown' }
                ]
              },
              {
                label: '链接页面',
                name: 'link',
                file: 'source/link/index.md',
                fields: [
                  { label: '标题', name: 'title', widget: 'string' },
                  { label: '内容', name: 'body', widget: 'markdown' }
                ]
              },
              {
                label: '工具页面',
                name: 'tools',
                file: 'source/tools/index.md',
                fields: [
                  { label: '标题', name: 'title', widget: 'string' },
                  { label: '内容', name: 'body', widget: 'markdown' }
                ]
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
